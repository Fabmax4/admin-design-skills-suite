# 案例层样本集：用于验证总入口 Skill 的分流效果，不是规则层文件。
# 允许保留具体行业语境、对象名和任务描述，但这些内容不应直接回流到通用规则层。
cases:
  - id: "case-01"
    title: "门店履约工作台从零设计"
    prompt: "帮我设计一个零售兑换后台的门店履约工作台，要能先看到超时风险和待处理门店。"
    expected_stage: "模糊目标"
    expected_start_skill:
      - "admin-design-principles"
    expected_chain:
      - "admin-design-principles"
      - "admin-design-patterns"
      - "admin-design-style"
      - "admin-design-components"
    avoid_layers:
      - "admin-design-motion"
    validation_focus: "先明确第一优先动作和页面范式，不直接跳到视觉细节。"
  - id: "case-02"
    title: "兑换单列表结构重构"
    prompt: "现有兑换单列表信息太乱，帮我重构结构，但先别讨论颜色。"
    expected_stage: "结构设计"
    expected_start_skill:
      - "admin-design-patterns"
    expected_chain:
      - "admin-design-patterns"
      - "admin-design-components"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-style"
      - "admin-design-motion"
    validation_focus: "优先重构模式块和契约，不被视觉话题带偏。"
  - id: "case-03"
    title: "商品编辑页视觉收紧"
    prompt: "商品编辑页结构先不动，把圆角、留白和头部收紧一点，更像标准后台。"
    expected_stage: "样式收敛"
    expected_start_skill:
      - "admin-design-style"
    expected_chain:
      - "admin-design-style"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-principles"
      - "admin-design-patterns"
    validation_focus: "识别结构已定，只需要视觉约束。"
  - id: "case-04"
    title: "补货页图表取舍"
    prompt: "补货页里有门店库存、渠道配额和覆盖天数，帮我判断哪些该做图，哪些留在表格里。"
    expected_stage: "数据表达"
    expected_start_skill:
      - "admin-design-visualization"
    expected_chain:
      - "admin-design-visualization"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-motion"
    validation_focus: "只判断图表与表格信号，不重做页面结构。"
  - id: "case-05"
    title: "异常处理台反馈补强"
    prompt: "异常处理台的筛选和恢复动作做完后反馈不明显，帮我补必要的动效和状态提示。"
    expected_stage: "反馈打磨"
    expected_start_skill:
      - "admin-design-motion"
    expected_chain:
      - "admin-design-motion"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-visualization"
    validation_focus: "强调状态反馈，不添加装饰性动画。"
  - id: "case-06"
    title: "后台方案最终验收"
    prompt: "这是我们新后台方案，帮我做最终 review，指出最该先修的层。"
    expected_stage: "最终评审"
    expected_start_skill:
      - "admin-design-review"
    expected_chain:
      - "admin-design-review"
    avoid_layers: []
    validation_focus: "直接进入总审查，不重新走完整设计链路。"
  - id: "case-07"
    title: "库存健康组件抽象"
    prompt: "我想把库存健康、门店压力、渠道效率统一抽成一类后台组件，先别写页面。"
    expected_stage: "组件抽象"
    expected_start_skill:
      - "admin-design-patterns"
    expected_chain:
      - "admin-design-patterns"
      - "admin-design-components"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-style"
    validation_focus: "先回收到抽象模式，而不是继续扩业务组件名。"
  - id: "case-08"
    title: "只给业务目标的后台规划"
    prompt: "我们要做一个支持商品、服务和兑换运营的后台，先帮我判断应该优先做哪些后台页。"
    expected_stage: "方向判断"
    expected_start_skill:
      - "admin-design-principles"
    expected_chain:
      - "admin-design-principles"
      - "admin-design-patterns"
    avoid_layers:
      - "admin-design-style"
      - "admin-design-motion"
    validation_focus: "先做页面范式规划，而不是跳进单页实现。"
  - id: "case-09"
    title: "订单列表上方摘要区"
    prompt: "订单列表已经稳定了，我只想加一个上方摘要区，帮我判断哪些指标值得图形化。"
    expected_stage: "数据表达"
    expected_start_skill:
      - "admin-design-visualization"
    expected_chain:
      - "admin-design-visualization"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-components"
    validation_focus: "识别为摘要区表达问题，而不是列表结构问题。"
  - id: "case-10"
    title: "后台被做成营销页"
    prompt: "这个后台现在太像营销页了，帮我拉回标准后台，但不要重做功能。"
    expected_stage: "样式收敛"
    expected_start_skill:
      - "admin-design-style"
    expected_chain:
      - "admin-design-style"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-patterns"
    validation_focus: "优先收视觉边界，不轻易改业务结构。"
  - id: "case-11"
    title: "先重构结构，再顺手收视觉"
    prompt: "这个门店履约页结构有点乱，也顺手帮我把头部和卡片收紧一点，但先把结构梳清。"
    expected_stage: "混合意图，主意图是结构设计"
    expected_start_skill:
      - "admin-design-patterns"
    expected_chain:
      - "admin-design-patterns"
      - "admin-design-components"
      - "admin-design-style"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-motion"
    validation_focus: "先处理结构，再把视觉收敛作为第二步。"
  - id: "case-12"
    title: "先做后台规划，再决定哪些要上图"
    prompt: "先帮我规划这套零售兑换后台应该有哪些核心页面，再顺带判断哪些页面值得做图表摘要。"
    expected_stage: "混合意图，主意图是方向判断"
    expected_start_skill:
      - "admin-design-principles"
    expected_chain:
      - "admin-design-principles"
      - "admin-design-patterns"
      - "admin-design-visualization"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-motion"
    validation_focus: "先做页面范式规划，再延后处理图表取舍。"
  - id: "case-13"
    title: "先 review，再给下一轮设计链路"
    prompt: "先 review 这个后台方案哪里偏了，再告诉我下一轮应该按什么 Skill 顺序继续推进。"
    expected_stage: "混合意图，主意图是最终评审"
    expected_start_skill:
      - "admin-design-review"
    expected_chain:
      - "admin-design-review"
    avoid_layers: []
    validation_focus: "先进入总审查，再把后续 Skill 链路作为 review 结论输出。"
  - id: "case-14"
    title: "先抽组件，再补图表表达建议"
    prompt: "先把渠道效率和门店压力抽成一类可复用组件，再帮我判断这个组件在哪些页面里适合配图表摘要。"
    expected_stage: "混合意图，主意图是组件抽象"
    expected_start_skill:
      - "admin-design-patterns"
    expected_chain:
      - "admin-design-patterns"
      - "admin-design-components"
      - "admin-design-visualization"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-style"
    validation_focus: "先回收抽象组件，再处理它在页面里的表达方式。"
  - id: "case-15"
    title: "结构已定，先收视觉，再补必要反馈"
    prompt: "列表页结构先别动，先把视觉压回标准后台，再补一点必要的切换反馈。"
    expected_stage: "混合意图，主意图是样式收敛"
    expected_start_skill:
      - "admin-design-style"
    expected_chain:
      - "admin-design-style"
      - "admin-design-motion"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-patterns"
    validation_focus: "先收视觉，再把动效控制在反馈层。"
  - id: "case-16"
    title: "先判断要不要图，再决定是否值得补动效"
    prompt: "这个运营概览页我不确定该不该上图，如果值得上图，再看需不需要做一点趋势切换反馈。"
    expected_stage: "混合意图，主意图是数据表达"
    expected_start_skill:
      - "admin-design-visualization"
    expected_chain:
      - "admin-design-visualization"
      - "admin-design-motion"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-components"
    validation_focus: "先判断图表是否必要，再延后动效决策。"
  - id: "case-17"
    title: "先重构详情页信息层级，再统一规则组件"
    prompt: "商品详情页信息层级不太对，先把详情结构理顺，再把规则区统一成一套可复用组件。"
    expected_stage: "混合意图，主意图是结构设计"
    expected_start_skill:
      - "admin-design-patterns"
    expected_chain:
      - "admin-design-patterns"
      - "admin-design-components"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-style"
    validation_focus: "先处理详情页结构，再处理规则组件抽象。"
  - id: "case-18"
    title: "先 review 可视化，再决定是否回退到结构层"
    prompt: "先 review 这个数据密集页的图表有没有做过头，如果问题不只是图表，再告诉我是不是要回退去改结构。"
    expected_stage: "混合意图，主意图是最终评审"
    expected_start_skill:
      - "admin-design-review"
    expected_chain:
      - "admin-design-review"
    avoid_layers: []
    validation_focus: "先做总审查，再判断是否需要回退到结构层。"
  - id: "case-19"
    title: "结构先别动，但统一规则组件"
    prompt: "商品详情页结构先别动，但顺手把规则区重构成一套统一组件。"
    expected_stage: "冲突意图，硬约束是结构冻结"
    expected_start_skill:
      - "admin-design-components"
    expected_chain:
      - "admin-design-components"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-patterns"
    validation_focus: "在不改结构的边界内判断组件统一是否可行。"
  - id: "case-20"
    title: "不想上图，但想做图表摘要区"
    prompt: "我其实不想让页面上图，但又想做一个图表摘要区，你帮我判断有没有不靠图表的替代方案。"
    expected_stage: "冲突意图，冲突发生在数据表达层"
    expected_start_skill:
      - "admin-design-visualization"
    expected_chain:
      - "admin-design-visualization"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-motion"
    validation_focus: "先识别不要上图是硬约束，再给出非图表替代。"
  - id: "case-21"
    title: "保持营销感，但拉回标准后台"
    prompt: "这个页面先保持现在的营销感，但又想拉回标准后台一点，你帮我判断哪些能保留，哪些必须收掉。"
    expected_stage: "冲突意图，冲突发生在样式层"
    expected_start_skill:
      - "admin-design-style"
    expected_chain:
      - "admin-design-style"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-patterns"
    validation_focus: "先划出后台不可退让的视觉边界。"
  - id: "case-22"
    title: "先别正式 review，但告诉我哪里偏了"
    prompt: "先别做正式 review，但你直接告诉我这套后台哪里偏了、优先修什么。"
    expected_stage: "冲突意图，实际主意图仍是最终评审"
    expected_start_skill:
      - "admin-design-review"
    expected_chain:
      - "admin-design-review"
    avoid_layers: []
    validation_focus: "识别这本质上仍是 review 请求。"
  - id: "case-23"
    title: "先不要动结构，但当场出新信息架构"
    prompt: "列表页先不要动结构，但你帮我当场出一版新的信息架构方向。"
    expected_stage: "冲突意图，硬约束与结构诉求互相冲突"
    expected_start_skill:
      - "admin-design-review"
    expected_chain:
      - "admin-design-review"
    avoid_layers:
      - "admin-design-patterns"
    validation_focus: "先指出不能同时完成，再把结构方向作为后续建议。"
  - id: "case-24"
    title: "保留现有动效，但整体更安静"
    prompt: "现在这些动效先都保留，但整体要更安静一些，别影响操作。"
    expected_stage: "冲突意图，冲突发生在反馈层"
    expected_start_skill:
      - "admin-design-motion"
    expected_chain:
      - "admin-design-motion"
      - "admin-design-review"
    avoid_layers:
      - "admin-design-style"
    validation_focus: "区分必须保留的反馈和可以降级的装饰性动效。"
